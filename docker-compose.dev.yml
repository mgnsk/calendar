---
volumes:
  go-packages:
  go-cache:
  npm-cache:
  caddy-data:
  caddy-config:
  calendar-database:

services:
  caddy:
    image: caddy@sha256:25cdc846626b62d05f6b633b9b40c2c9f6ef89b515dc76133cefd920f7dbe562
    restart: unless-stopped
    ports:
      - 80:80/tcp
      - 443:443/tcp
    environment:
      HOSTNAME: "calendar.localhost"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  sandbox:
    hostname: calendar
    image: calendar-sandbox
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - uid
        - gid
    init: true
    stdin_open: true
    tty: true
    environment:
      HOSTNAME: "calendar.localhost"
      LISTEN_ADDR: ":8080"
      DATABASE_DIR: "/database"
    volumes:
      - ./:/application
      - npm-cache:/home/node/.npm
      - go-packages:/go
      - go-cache:/go-cache
      - calendar-database:/database
