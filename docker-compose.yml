---
volumes:
  caddy-data:
  caddy-config:
  calendar-database:

services:
  caddy:
    image: caddy@sha256:dedfbbeb703b2ce9ff4a98fc06aa9c7c7d9a42f0b7d778738c1dd3ef11dcc767
    restart: unless-stopped
    environment:
      HOSTNAME: "events.example.testing"
    ports:
      - 80:80/tcp
      - 443:443/tcp
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  calendar:
    image: ghcr.io/mgnsk/calendar:edge
    build:
      context: .
    command: /bin/calendar
    container_name: calendar
    restart: unless-stopped
    environment:
      HOSTNAME: "events.example.testing"
      LISTEN_ADDR: ":8080"
      DATABASE_DIR: "/database"
    volumes:
      - calendar-database:/database
